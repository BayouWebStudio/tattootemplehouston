  <style>
    
    :root {
      --black: #0f1419;
      --charcoal: #1a2028;
      --gold: #8899aa;
      --white: #c8d0d8;
      --dim: #c8d0d899;
      --border: #383e46;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem; font-weight: 400;
      letter-spacing: 0.1em; color: var(--white);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 32px; list-style: none; align-items: center; }
    .nav-links a {
      color: var(--dim); text-decoration: none;
      font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--white); }
    .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 1px; background: var(--white); margin: 5px 0; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(4px,4px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(4px,-4px); }
    .mobile-menu {
      display: none; position: fixed; top: 65px; left: 0; right: 0; z-index: 99;
      background: var(--charcoal); padding: 24px 48px;
      border-bottom: 1px solid var(--border);
    }
    .mobile-menu.open { display: block; }
    .mobile-menu a {
      display: block; color: var(--white); text-decoration: none;
      font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .book-float {
      position: fixed; bottom: 32px; right: 32px; z-index: 200;
      background: var(--gold); color: #000;
      font-size: 0.72rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
      text-decoration: none; padding: 14px 22px; border-radius: 2px;
      box-shadow: 0 4px 24px rgba(201,168,76,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .book-float:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(201,168,76,0.5); }
    .fade-up { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
    footer {
      background: var(--charcoal); padding: 48px 72px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 24px;
    }
    .footer-logo { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.1rem; color: var(--dim); }
    .footer-links { display: flex; gap: 24px; flex-wrap: wrap; }
    .footer-links a { color: var(--dim); text-decoration: none; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; transition: color 0.2s; }
    .footer-links a:hover { color: var(--white); }
    .footer-copy { color: var(--dim); font-size: 0.72rem; }
    .section-label { font-size: 0.68rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    h2 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 400; line-height: 1.1; margin-bottom: 24px; }
    .btn-gold { display: inline-block; background: var(--gold); color: #000; text-decoration: none; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; padding: 16px 40px; transition: opacity 0.2s; }
    .btn-gold:hover { opacity: 0.88; }
    .btn-outline { display: inline-block; border: 1px solid var(--border); color: var(--white); text-decoration: none; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; padding: 14px 36px; transition: border-color 0.2s, color 0.2s; }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    @media (max-width: 900px) {
      nav { padding: 18px 24px; }
      .nav-links { display: none; }
      .hamburger { display: block; }
      footer { padding: 40px 24px; flex-direction: column; text-align: center; }
    }
    @media (max-width: 600px) { footer { padding: 32px 20px; } }
  
    .hero {
      min-height: 100vh; display: flex; align-items: flex-end;
      padding: 0 72px 80px; position: relative; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-image: url('./img/google_4.jpg');
      background-size: cover; background-position: center;
      filter: brightness(0.42); transform: scale(1.02);
    }
    .hero-gradient {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(5,5,5,0.95) 0%, rgba(5,5,5,0.15) 55%, transparent 100%);
    }
    .hero-content { position: relative; z-index: 2; max-width: 700px; }

    .hero-cta:hover { background: var(--gold); color: #000; }
    /* ABOUT */
    .about-section { background: var(--charcoal); padding: 96px 72px; }
    .about-inner { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
    .about-text p { color: var(--dim); line-height: 1.8; margin-bottom: 20px; font-size: 0.95rem; }
    .about-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; filter: brightness(0.85); }
    /* ARTISTS GRID */
    .artists-section { padding: 96px 72px; }
    .artists-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 2px; max-width: 1200px; margin: 0 auto 48px; }
    .artist-card { position: relative; overflow: hidden; aspect-ratio: 3/4; }
    .artist-card img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); transition: filter 0.4s, transform 0.4s; display: block; }
    .artist-card:hover img { filter: brightness(0.9); transform: scale(1.04); }
    .artist-card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); }
    .artist-card-name { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 4px; }
    .artist-card-style { font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .artist-card-link { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.6); text-decoration: none; transition: color 0.2s; }
    .artist-card-link:hover { color: var(--gold); }
    /* GALLERY PREVIEW */
    .gallery-preview { padding: 96px 72px; background: var(--charcoal); }
    .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; max-width: 1200px; margin: 0 auto 40px; }
    .gallery-item { aspect-ratio: 1; overflow: hidden; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); transition: filter 0.3s, transform 0.3s; display: block; }
    .gallery-item:hover img { filter: brightness(1); transform: scale(1.04); }
    /* REVIEWS */
    .reviews-preview { padding: 96px 72px; }
    .reviews-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 1100px; margin: 0 auto 40px; }
    .review-card { border: 1px solid var(--border); padding: 32px; }
    .review-stars { color: var(--gold); font-size: 0.9rem; margin-bottom: 12px; letter-spacing: 2px; }
    .review-text { color: var(--dim); font-size: 0.88rem; line-height: 1.7; margin-bottom: 16px; font-style: italic; }
    .review-author { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--white); }
    .review-time { font-size: 0.68rem; color: var(--dim); margin-top: 4px; }
    /* LOCATION */
    .location-section { background: var(--charcoal); padding: 96px 72px; }
    .location-inner { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 64px; }
    .location-detail { margin-bottom: 28px; }
    .location-label { font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .location-value { color: var(--dim); line-height: 1.7; font-size: 0.92rem; }
    .hours-list { list-style: none; }
    .hours-list li { color: var(--dim); font-size: 0.88rem; padding: 6px 0; border-bottom: 1px solid var(--border); }
    /* BOOKING CTA */
    .booking-cta { padding: 96px 72px; text-align: center; }
    .booking-cta h2 { max-width: 560px; margin: 0 auto 20px; }
    .booking-cta p { color: var(--dim); max-width: 480px; margin: 0 auto 36px; font-size: 0.95rem; }
    @media (max-width: 900px) {
      .hero { padding: 0 24px 60px; }
      .about-section, .artists-section, .gallery-preview, .reviews-preview, .location-section, .booking-cta { padding: 72px 24px; }
      .about-inner { grid-template-columns: 1fr; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .reviews-grid { grid-template-columns: 1fr; }
      .location-inner { grid-template-columns: 1fr; }
      .artists-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
      .artists-grid { grid-template-columns: 1fr; }
    }

<script>
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, { threshold: 0.12 });
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
    });
